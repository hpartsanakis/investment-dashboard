<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="app">
      <h1>Investment Dashboard</h1>

      <section class="card">
        <h2>Investment hinzufügen</h2>
<label for="assetSearch">Wertpapiersuche</label>
<input
  type="text"
  id="assetSearch"
  placeholder="Name, ISIN, WKN oder Ticker eingeben"
/>

<button type="button" id="searchAsset">Suchen</button>

<div id="searchResults"></div>

<input type="hidden" id="assetName" />
        

<button type="button" id="fetchPrice">Live Preis laden</button>
        

        <label for="monthlyInvestment">Monatliche Investition (€)</label>
        <input type="number" id="monthlyInvestment" placeholder="z.B. 500" />

        <label for="buyPrice">Kaufpreis pro Stück (€)</label>
        <input type="number" id="buyPrice" placeholder="z.B. 100" />

        <label for="currentPrice">Aktueller Preis pro Stück (€)</label>
        <input type="number" id="currentPrice" placeholder="z.B. 110" />

        <label for="units">Gekaufte Units</label>
        <input type="number" id="units" readonly />

        <button type="button" id="addInvestment">Investment hinzufügen</button>
        <button type="button" id="resetAll">Alles löschen</button>
      </section>

      <section class="card">
        <h2>Portfolio Übersicht</h2>
        <p>Gesamt investiert: <strong id="totalInvested">0.00 €</strong></p>
        <p>Gesamtwert heute: <strong id="totalValue">0.00 €</strong></p>
        <p>Gewinn / Verlust: <strong id="totalProfit">0.00 €</strong></p>
        <p>Gesamt Units: <strong id="totalUnits">0.0000</strong></p>
      </section>

      <section class="card">
        <h2>Investments</h2>
        <div id="investmentList"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
