<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Investment Dashboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header>
      <h1>Investment Dashboard</h1>
      <p>Portfolio, ETFs, Fonds, Cash & Performance</p>
    </header>

    <section class="cards">
      <div class="card">
        <h2>Gesamtwert</h2>
        <p id="totalValue">€0</p>
      </div>

      <div class="card">
        <h2>Investiert</h2>
        <p id="totalInvested">€0</p>
      </div>

      <div class="card">
        <h2>Gewinn / Verlust</h2>
        <p id="profitLoss">€0</p>
      </div>
    </section>

    <section class="cards">
  <div class="card">
    <h2>Asset Allocation</h2>
    <div id="allocationList"></div>
  </div>

  <div class="card">
    <h2>Watchlist</h2>
    <input id="watchInput" placeholder="z.B. AAPL, MSFT, VWCE" />
    <button onclick="addWatchItem()">Add</button>
    <ul id="watchList"></ul>
  </div>
</section>

    <section class="add-asset">
  <h2>Add Asset</h2>

  <input id="name" placeholder="Name (ETF / Stock)" />
  <input id="type" placeholder="Type" />
  <input id="isin" placeholder="ISIN" />
  <input id="invested" type="number" placeholder="Invested €" />
  <input id="current" type="number" placeholder="Current Value €" />
  <input id="symbol" placeholder="Symbol z.B. AAPL, MSFT, VUSA.L" />

  <button onclick="addAsset()">Add</button>
</section>

    <section class="portfolio">
      <h2>Portfolio</h2>
      <div id="portfolioList"></div>
    </section>
  </main>

<script src="config.js"></script>
<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
