<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Investment Dashboard</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="app">
      <h1>Investment Dashboard</h1>

      <!-- 🔹 ASSET ANLEGEN -->
      <section class="card">
        <h2>Asset anlegen</h2>

        <label>Name</label>
        <input type="text" id="assetName" placeholder="z.B. FTSE All World ETF" />

        <label>WKN</label>
        <input type="text" id="assetWkn" placeholder="z.B. A2PKXG" />

        <label>ISIN</label>
        <input type="text" id="assetIsin" placeholder="z.B. IE00BK5BQT80" />

        <label>Ticker</label>
        <input type="text" id="assetTicker" placeholder="z.B. VWCE" />

        <button type="button" id="addAsset">Asset speichern</button>
      </section>

      <!-- 🔹 ASSET LISTE -->
      <section class="card">
  <h2>Gespeicherte Assets</h2>

  <table id="assetTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>WKN</th>
        <th>ISIN</th>
        <th>Ticker</th>
        <th>Aktionen</th>
      </tr>
    </thead>
    <tbody id="assetTableBody"></tbody>
  </table>
</section>

      <!-- 🔹 INVESTMENT -->
      <section class="card">
        <h2>Investment hinzufügen</h2>

        <label>Asset auswählen</label>
        <select id="investmentAsset"></select>

        <label>Monatliche Investition (€)</label>
        <input type="number" id="monthlyInvestment" placeholder="z.B. 500" />

        <label>Kaufpreis pro Stück (€)</label>
        <input type="number" id="buyPrice" placeholder="z.B. 100" />

        <label>Aktueller Preis (€)</label>
        <input type="number" id="currentPrice" placeholder="z.B. 110" />

        <label>Gekaufte Units</label>
        <input type="number" id="units" readonly />

        <button type="button" id="addInvestment">Investment hinzufügen</button>
        <button type="button" id="resetAll">Alle Investments löschen</button>
      </section>

      <!-- 🔹 PORTFOLIO -->
     <section class="card">
  <h2>Portfolio Übersicht</h2>

  <table id="portfolioTable">
    <thead>
      <tr>
        <th>Asset</th>
        <th>Investiert (€)</th>
        <th>Wert (€)</th>
        <th>Gewinn / Verlust (€)</th>
        <th>Units</th>
      </tr>
    </thead>
    <tbody id="portfolioTableBody"></tbody>
    <tfoot>
      <tr>
        <th>GESAMT</th>
        <th id="totalInvested">0.00 €</th>
        <th id="totalValue">0.00 €</th>
        <th id="totalProfit">0.00 €</th>
        <th id="totalUnits">0.0000</th>
      </tr>
    </tfoot>
  </table>
</section>

      <!-- 🔹 INVESTMENT LISTE -->
      <section class="card">
        <h2>Investments</h2>
        <div id="investmentList"></div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
